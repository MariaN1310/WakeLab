<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript
    AddOutputFilterByType DEFLATE application/javascript application/json
    AddOutputFilterByType DEFLATE application/xml text/xml image/svg+xml
    AddOutputFilterByType DEFLATE font/woff font/woff2

    # No comprimir si ya viene comprimido
    SetEnvIfNoCase Request_URI \.(?:gz|br|zip|png|jpg|jpeg|webp|ico|woff|woff2)$ no-gzip dont-vary

    # Agregar Vary header para proxies
    Header append Vary Accept-Encoding
</IfModule>
